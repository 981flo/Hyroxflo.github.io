<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #2a2a2a;
  --accent: #d4ff00;
  --accent2: #ff4500;
  --text: #f2f2f2;
  --muted: #666;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; }

/* ── SCREEN STACK ── */
.screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
.screen.active { display: flex; }

/* ── TOP BAR ── */
.topbar {
padding: calc(var(–safe-top) + 12px) 16px 12px;
background: var(–surface);
border-bottom: 1px solid var(–border);
display: flex; align-items: center; gap: 10px;
flex-shrink: 0;
}
.topbar-back {
width: 32px; height: 32px; border-radius: 50%;
background: var(–surface2); border: none; color: var(–text);
font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}
.topbar-title { font-size: 17px; font-weight: 700; letter-spacing: 0.3px; flex: 1; }
.topbar-badge {
font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
background: var(–accent); color: #000; letter-spacing: 0.5px; text-transform: uppercase;
}

/* ── SCROLLABLE BODY ── */
.scroll-body {
flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
padding-bottom: calc(var(–safe-bottom) + 16px);
}

/* ── HOME SCREEN ── */
.home-hero {
padding: 28px 20px 20px;
background: linear-gradient(160deg, #111 0%, #0a0a0a 100%);
border-bottom: 1px solid var(–border);
}
.hero-eyebrow {
font-size: 11px; font-weight: 600; color: var(–accent);
letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
}
.hero-title {
font-size: 38px; font-weight: 900; line-height: 1;
letter-spacing: -1px; margin-bottom: 6px;
}
.hero-title span { color: var(–accent); }
.hero-sub { font-size: 14px; color: var(–muted); margin-bottom: 20px; }

.hero-stats {
display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.hero-stat {
background: var(–surface); border: 1px solid var(–border);
border-radius: 12px; padding: 12px 10px; text-align: center;
}
.hero-stat .n { font-size: 26px; font-weight: 900; color: var(–accent); line-height: 1; }
.hero-stat .l { font-size: 10px; color: var(–muted); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

/* PHASE CARDS */
.section-label {
padding: 16px 20px 8px;
font-size: 12px; font-weight: 700; color: var(–muted);
letter-spacing: 1.5px; text-transform: uppercase;
}
.phase-cards { display: flex; flex-direction: column; gap: 0; padding: 0 16px 16px; gap: 10px; }
.phase-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: 16px; overflow: hidden; cursor: pointer;
transition: transform 0.15s, border-color 0.15s;
-webkit-user-select: none; user-select: none;
}
.phase-card:active { transform: scale(0.98); }
.phase-card-top { display: flex; align-items: center; padding: 16px; gap: 14px; }
.phase-num {
width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
font-size: 20px; font-weight: 900;
}
.pn1 { background: rgba(33,150,243,0.15); color: #64b5f6; }
.pn2 { background: rgba(255,152,0,0.15); color: #ffb74d; }
.pn3 { background: rgba(244,67,54,0.15); color: #ef9a9a; }
.pn4 { background: rgba(212,255,0,0.15); color: var(–accent); }
.phase-card-info { flex: 1; }
.phase-card-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
.phase-card-sub { font-size: 13px; color: var(–muted); }
.phase-card-arrow { color: var(–muted); font-size: 18px; }
.phase-card-bar {
height: 3px; background: var(–border);
margin: 0 16px 14px;
border-radius: 2px; overflow: hidden;
}
.phase-card-bar-fill { height: 100%; border-radius: 2px; }
.pf1 { background: #64b5f6; width: 100%; }
.pf2 { background: #ffb74d; width: 100%; }
.pf3 { background: #ef9a9a; width: 100%; }
.pf4 { background: var(–accent); width: 100%; }

/* ── PHASE SCREEN ── */
.phase-header-block {
padding: 20px; background: var(–surface); border-bottom: 1px solid var(–border);
}
.phase-header-block .ph-label {
font-size: 11px; font-weight: 700; color: var(–accent);
letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px;
}
.phase-header-block .ph-title { font-size: 26px; font-weight: 900; margin-bottom: 6px; line-height: 1.1; }
.phase-header-block .ph-desc { font-size: 13px; color: var(–muted); line-height: 1.6; margin-bottom: 14px; }
.phase-mini-stats { display: flex; gap: 10px; flex-wrap: wrap; }
.pms { background: var(–surface2); border: 1px solid var(–border); border-radius: 10px; padding: 8px 12px; }
.pms .v { font-size: 18px; font-weight: 800; color: var(–text); }
.pms .l { font-size: 10px; color: var(–muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

.weeks-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.week-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: 14px; overflow: hidden; cursor: pointer;
transition: transform 0.15s;
}
.week-card:active { transform: scale(0.98); }
.week-card-header { display: flex; align-items: center; padding: 14px 16px; gap: 12px; }
.week-num-badge {
background: var(–accent); color: #000;
font-size: 11px; font-weight: 800;
padding: 3px 8px; border-radius: 6px;
letter-spacing: 0.5px; flex-shrink: 0;
}
.week-focus-text { font-size: 14px; font-weight: 600; flex: 1; }
.week-card-arrow { color: var(–muted); font-size: 16px; }
.week-card-days { padding: 0 12px 12px; display: flex; gap: 6px; flex-wrap: wrap; }
.day-pill {
font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px;
text-transform: uppercase; letter-spacing: 0.5px;
cursor: pointer; transition: transform 0.1s;
}
.day-pill:active { transform: scale(0.95); }
.dp-lauf { background: rgba(33,150,243,0.2); color: #64b5f6; }
.dp-kraft { background: rgba(255,152,0,0.2); color: #ffb74d; }
.dp-hyrox { background: rgba(212,255,0,0.15); color: #c8ef00; }
.dp-ausdauer { background: rgba(76,175,80,0.2); color: #81c784; }
.dp-rest { background: rgba(100,100,100,0.2); color: #888; }
.dp-hiit { background: rgba(244,67,54,0.2); color: #ef9a9a; }
.dp-mobility { background: rgba(156,39,176,0.2); color: #ce93d8; }

/* ── DAY SCREEN ── */
.day-hero {
padding: 20px; border-bottom: 1px solid var(–border);
background: var(–surface);
}
.day-hero .d-day {
font-size: 11px; font-weight: 700; color: var(–muted);
text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;
}
.day-hero .d-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; line-height: 1.1; }
.day-hero-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.d-type-tag {
font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px;
text-transform: uppercase; letter-spacing: 0.5px;
}
.d-duration {
font-size: 13px; color: var(–accent); font-weight: 700;
background: rgba(212,255,0,0.1); padding: 4px 10px; border-radius: 8px;
}

.exercises-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.ex-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: 14px; padding: 14px 16px;
border-left: 3px solid var(–border);
}
.ex-card.highlight { border-left-color: var(–accent); }
.ex-card.wod { border-left-color: var(–accent2); }
.ex-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.ex-name { font-size: 15px; font-weight: 700; line-height: 1.2; }
.ex-time {
font-size: 11px; color: var(–accent); font-weight: 700;
background: rgba(212,255,0,0.1); padding: 3px 8px; border-radius: 6px;
white-space: nowrap; flex-shrink: 0;
}
.ex-desc { font-size: 13px; color: var(–muted); line-height: 1.6; }

/* Apple Fitness Tipps im Day-Screen */
.apple-tip-inline {
margin: 16px 16px 0;
padding: 12px 14px;
background: rgba(212,255,0,0.05);
border: 1px solid rgba(212,255,0,0.15);
border-radius: 12px;
}
.apple-tip-inline h4 { font-size: 13px; font-weight: 700; color: var(–accent); margin-bottom: 4px; }
.apple-tip-inline p { font-size: 12px; color: var(–muted); line-height: 1.5; }

/* ── BOTTOM NAV (optional) ── */
.bottom-nav {
padding: 12px 20px calc(var(–safe-bottom) + 12px);
background: var(–surface); border-top: 1px solid var(–border);
display: flex; gap: 12px; flex-shrink: 0;
}
.btn-primary {
flex: 1; background: var(–accent); color: #000;
font-size: 15px; font-weight: 800; border: none; border-radius: 12px;
padding: 14px; cursor: pointer; text-align: center;
letter-spacing: 0.3px;
}
.btn-secondary {
background: var(–surface2); color: var(–text);
font-size: 15px; font-weight: 700; border: 1px solid var(–border);
border-radius: 12px; padding: 14px 20px; cursor: pointer; white-space: nowrap;
}
</style>

</head>

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
let currentPhase = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() { showScreen('home'); }

function goBack() {
  if (currentPhase) {
    renderPhaseScreen(currentPhase);
    showScreen('phase');
  } else {
    showScreen('home');
  }
}

// ═══════════════════════════════════════
// RENDER HOME
// ═══════════════════════════════════════
function renderHome() {
  const container = document.getElementById('phase-cards-container');
  container.innerHTML = phases.map(p => `
    <div class="phase-card" onclick="openPhase(${p.num})">
      <div class="phase-card-top">
        <div class="phase-num ${p.numClass}">${p.num}</div>
        <div class="phase-card-info">
          <div class="phase-card-name">${p.name}</div>
          <div class="phase-card-sub">${p.sub} · ${p.hrs} · ${p.intensity}</div>
        </div>
        <div class="phase-card-arrow">›</div>
      </div>
      <div class="phase-card-bar"><div class="phase-card-bar-fill ${p.barClass}"></div></div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════
// RENDER PHASE
// ═══════════════════════════════════════
function openPhase(num) {
  currentPhase = num;
  renderPhaseScreen(num);
  showScreen('phase');
}

function renderPhaseScreen(num) {
  const p = phases[num - 1];
  document.getElementById('phase-screen-title').textContent = `Phase ${num}`;

  document.getElementById('phase-header-content').innerHTML = `
    <div class="ph-label">Phase ${p.num} · ${p.sub}</div>
    <div class="ph-title">${p.name}</div>
    <div class="ph-desc">${p.desc}</div>
    <div class="phase-mini-stats">
      <div class="pms"><div class="v">${p.weeks}</div><div class="l">Wochen</div></div>
      <div class="pms"><div class="v">${p.hrs}</div><div class="l">Training</div></div>
      <div class="pms"><div class="v">${p.intensity}</div><div class="l">Intensität</div></div>
    </div>
  `;

  const startWeek = (num - 1) * 4 + 1;
  const weeksHTML = Array.from({length:4}, (_, i) => {
    const wNum = startWeek + i;
    const plan = weekPlans[wNum];
    if (!plan) return '';
    const pillsHTML = plan.days.map(d =>
      `<div class="day-pill dp-${d.type}" onclick="event.stopPropagation(); openDay(${wNum}, ${plan.days.indexOf(d)})">${d.name.slice(0,2)}</div>`
    ).join('');
    return `
      <div class="week-card" onclick="openWeekDays(${wNum})">
        <div class="week-card-header">
          <div class="week-num-badge">W${wNum}</div>
          <div class="week-focus-text">${plan.focus}</div>
          <div class="week-card-arrow">›</div>
        </div>
        <div class="week-card-days">${pillsHTML}</div>
      </div>
    `;
  }).join('');

  document.getElementById('weeks-list-content').innerHTML = weeksHTML;
}

// ═══════════════════════════════════════
// RENDER WEEK
// ═══════════════════════════════════════
function openWeekDays(wNum) {
  const plan = weekPlans[wNum];
  if (!plan) return;

  const phaseNum = Math.ceil(wNum / 4);
  currentPhase = phaseNum;

  document.getElementById('phase-screen-title').textContent = `Woche ${wNum}`;
  document.getElementById('phase-header-content').innerHTML = `
    <div class="ph-label">Phase ${phaseNum} · Woche ${wNum}</div>
    <div class="ph-title">${plan.focus}</div>
    <div class="ph-desc">Tippe auf einen Tag für die vollständige Trainingseinheit mit allen Übungen und Anweisungen.</div>
  `;

  const daysHTML = plan.days.map((day, idx) => {
    const totalMins = day.duration !== '—' ? day.duration : null;
    return `
      <div class="week-card" onclick="openDay(${wNum}, ${idx})">
        <div class="week-card-header">
          <div class="day-pill dp-${day.type}" style="pointer-events:none">${day.name.slice(0,2)}</div>
          <div style="flex:1">
            <div class="week-focus-text">${day.name}: ${day.title}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${TYPE[day.type]}${totalMins ? ' · ' + totalMins : ''}</div>
          </div>
          <div class="week-card-arrow">›</div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('weeks-list-content').innerHTML = daysHTML;
  showScreen('phase');
}

// ═══════════════════════════════════════
// RENDER DAY
// ═══════════════════════════════════════
function openDay(wNum, dayIdx) {
  const plan = weekPlans[wNum];
  const day = plan.days[dayIdx];
  if (!day) return;

  currentPhase = Math.ceil(wNum / 4);
  document.getElementById('day-screen-title').textContent = day.name;

  const appleTip = APPLE[day.type] || '';

  const exHTML = day.exercises.map(ex => `
    <div class="ex-card ${ex.highlight ? 'highlight' : ''} ${ex.wod ? 'wod' : ''}">
      <div class="ex-card-top">
        <div class="ex-name">${ex.name}</div>
        ${ex.time !== '—' ? `<div class="ex-time">⏱ ${ex.time}</div>` : ''}
      </div>
      <div class="ex-desc">${ex.desc}</div>
    </div>
  `).join('');

  const legende = day.exercises.some(e => e.highlight) || day.exercises.some(e => e.wod) ? `
    <div style="padding:0 16px;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
      ${day.exercises.some(e => e.highlight) ? '<div style="font-size:11px;color:var(--accent);">● Kern-Übung</div>' : ''}
      ${day.exercises.some(e => e.wod) ? '<div style="font-size:11px;color:var(--accent2);">● HYROX-Station</div>' : ''}
    </div>` : '';

  document.getElementById('day-content-area').innerHTML = `
    <div class="day-hero">
      <div class="d-day">Woche ${wNum} · ${day.name}</div>
      <div class="d-title">${day.title}</div>
      <div class="day-hero-row">
        <div class="d-type-tag dp-${day.type}" style="background:transparent;border:1px solid;font-size:12px;padding:4px 10px;border-radius:8px">${TYPE[day.type]}</div>
        ${day.duration !== '—' ? `<div class="d-duration">⏱ ${day.duration}</div>` : ''}
      </div>
    </div>
    ${appleTip ? `<div class="apple-tip-inline"><h4>🍎 Apple Fitness+</h4><p>${appleTip}</p></div>` : ''}
    ${legende}
    <div class="exercises-list">${exHTML}</div>
    <div style="height:20px"></div>
  `;

  showScreen('day');
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderHome();

// Register service worker for offline use
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
